unbind C-b
set-option -g prefix C-t
bind-key C-t send-prefix
set-window-option -g mode-keys vi
set -sg escape-time 0
set -g status-bg black
set -g status-fg brightwhite
set -g pane-border-bg brightwhite
set -g pane-border-fg black
set -g pane-active-border-bg brightwhite
set -g pane-active-border-fg black
set -g base-index 1
set -g mouse on
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xsel -i -p -b"
bind r source-file ~/.tmux.conf
set -g status-right '#[bold] %H:%M:%S '
setw -g window-status-current-format ' #I:#[bold]#W '
setw -g window-status-format ' #I:#W '
setw -g window-status-attr none
setw -g status-left ''

